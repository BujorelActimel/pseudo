<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo++</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-hard: #1d2021;
      --bg: #282828;
      --bg-soft: #32302f;
      --bg1: #3c3836;
      --bg2: #504945;
      --bg3: #665c54;
      --bg4: #7c6f64;
      --fg: #ebdbb2;
      --fg2: #d5c4a1;
      --fg3: #bdae93;
      --fg4: #a89984;
      --gray: #928374;
      --red: #fb4934;
      --red-dim: #cc241d;
      --green: #b8bb26;
      --green-dim: #98971a;
      --yellow: #fabd2f;
      --yellow-dim: #d79921;
      --blue: #83a598;
      --blue-dim: #458588;
      --purple: #d3869b;
      --purple-dim: #b16286;
      --aqua: #8ec07c;
      --aqua-dim: #689d6a;
      --orange: #fe8019;
      --orange-dim: #d65d0e;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--fg);
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      background: var(--bg);
      border-bottom: 1px solid var(--bg1);
      flex-shrink: 0;
    }

    .toolbar-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toolbar-title span:first-child {
      font-size: 0.875rem;
      font-weight: 500;
    }

    .toolbar-title span:last-child {
      font-size: 0.75rem;
      color: var(--bg3);
    }

    .toolbar-actions {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.375rem 0.75rem;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    .btn-run {
      background: transparent;
      color: var(--green);
      padding: 0.5rem;
    }

    .btn-run:hover {
      background: var(--bg1);
      color: var(--green);
    }

    .btn-debug {
      background: transparent;
      color: var(--fg4);
      padding: 0.5rem;
    }

    .btn-debug:hover {
      background: var(--bg1);
      color: var(--yellow);
    }

    .btn-stop {
      background: transparent;
      color: var(--red);
      padding: 0.5rem;
    }

    .btn-stop:hover {
      background: var(--bg1);
      color: var(--red);
    }

    .btn-icon {
      padding: 0.5rem;
      background: transparent;
      color: var(--fg4);
    }

    .btn-icon:hover {
      background: var(--bg1);
      color: var(--fg);
    }

    #editor-container {
      position: relative;
    }

    .btn-lint-float {
      position: absolute;
      top: 8px;
      right: 20px;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      background: var(--bg1);
      border: 1px solid var(--bg3);
      border-radius: 4px;
      color: var(--fg4);
      cursor: pointer;
      transition: all 0.15s;
      opacity: 0.7;
    }

    .btn-lint-float:hover {
      background: var(--bg2);
      border-color: var(--yellow);
      color: var(--yellow);
      opacity: 1;
    }

    .btn-lint-float .icon {
      width: 16px;
      height: 16px;
    }

    .debug-indicator {
      margin-left: 0.5rem;
      font-size: 0.75rem;
      color: var(--yellow);
    }

    /* Main container */
    .main {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* Editor panel */
    .editor-panel {
      display: flex;
      flex-direction: column;
      min-width: 200px;
      background: var(--bg-hard);
    }

    .panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0 0.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--bg1);
      font-size: 0.75rem;
      min-height: 36px;
    }

    .panel-header-title {
      color: var(--fg4);
    }

    .panel-header-status {
      color: var(--green);
    }

    /* File tabs */
    .file-tab {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: transparent;
      border: none;
      border-radius: 4px 4px 0 0;
      font-family: inherit;
      font-size: 0.75rem;
      color: var(--fg4);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .file-tab:hover {
      background: var(--bg-soft);
      color: var(--fg2);
    }

    .file-tab.active {
      background: var(--bg-hard);
      color: var(--fg);
    }

    .file-tab-close {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 2px;
      color: var(--fg4);
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background-color 0.15s;
    }

    .file-tab:hover .file-tab-close,
    .file-tab.active .file-tab-close {
      opacity: 1;
    }

    .file-tab-close:hover {
      background: var(--bg2);
      color: var(--fg);
    }

    .file-tabs-wrapper {
      display: flex;
      align-items: center;
      max-width: calc(100% - 60px);
      overflow: hidden;
    }

    .tabs-scroll-btn {
      display: none;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 28px;
      padding: 0;
      background: var(--bg);
      border: none;
      color: var(--fg4);
      cursor: pointer;
      flex-shrink: 0;
    }

    .tabs-scroll-btn:hover {
      color: var(--fg);
      background: var(--bg-soft);
    }

    .tabs-scroll-btn.visible {
      display: flex;
    }

    .file-tabs {
      display: flex;
      align-items: center;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }

    .add-file-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--fg4);
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .add-file-btn:hover {
      background: var(--bg-soft);
      color: var(--fg);
    }

    #editor-container {
      flex: 1;
      min-height: 0;
    }

    /* Resize handle */
    .resize-handle {
      width: 4px;
      background: var(--bg1);
      cursor: col-resize;
      flex-shrink: 0;
      transition: background-color 0.15s;
    }

    .resize-handle:hover,
    .resize-handle.dragging {
      background: var(--blue);
    }

    /* Console panel */
    .console-panel {
      display: flex;
      flex-direction: column;
      min-width: 200px;
      background: var(--bg-hard);
    }

    .console-panel .panel-header {
      justify-content: space-between;
    }

    .console-output {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      font-size: 0.875rem;
      line-height: 1.5;
      cursor: text;
      scrollbar-width: none;
    }

    .console-output::-webkit-scrollbar {
      display: none;
    }

    .console-line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .console-line.output { color: var(--fg); }
    .console-line.input { color: var(--blue); }
    .console-line.error { color: var(--red); }
    .console-line.system { color: var(--gray); }
    .console-line.debug { color: var(--yellow); }

    .console-line.input::before {
      content: '< ';
      color: var(--blue);
    }

    .console-line.debug::before {
      content: '[DEBUG] ';
      color: var(--yellow);
    }

    .console-placeholder {
      color: var(--bg3);
    }

    .input-line {
      display: flex;
      align-items: center;
    }

    .input-prompt {
      color: var(--green);
    }

    .console-input {
      flex: 1;
      margin-left: 0.25rem;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: inherit;
      color: var(--fg);
      caret-color: var(--fg);
    }

    .cursor-blink {
      animation: blink 1s step-end infinite;
      color: var(--fg);
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Icons */
    .icon {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-lg {
      width: 20px;
      height: 20px;
    }

    /* Visual Mode Toggle */
    .btn-visual-toggle {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.5rem;
      margin-left: auto;
      background: var(--bg1);
      border: 1px solid var(--bg2);
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--fg4);
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-visual-toggle:hover {
      background: var(--bg2);
      color: var(--fg2);
    }

    .btn-visual-toggle.active {
      background: var(--aqua-dim);
      border-color: var(--aqua);
      color: var(--bg);
    }

    .toggle-switch {
      width: 24px;
      height: 14px;
      background: var(--bg3);
      border-radius: 7px;
      position: relative;
      transition: background 0.15s;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 10px;
      height: 10px;
      background: var(--fg4);
      border-radius: 50%;
      transition: transform 0.15s, background 0.15s;
    }

    .btn-visual-toggle.active .toggle-switch {
      background: var(--aqua);
    }

    .btn-visual-toggle.active .toggle-switch::after {
      transform: translateX(10px);
      background: var(--bg);
    }

    .toggle-label {
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* BAC Mode: sf replacement - hide 'sf' text and show └■ aligned with indent guide */
    .sf-replacement {
      color: transparent !important;
      background: transparent !important;
    }

    /* └■ marker for sf - positioned at start of sf (aligns with indent guide) */
    .sf-end-marker {
      position: relative;
    }

    .sf-end-marker::before {
      content: '└■';
      position: absolute;
      left: -0.432ch; /* crazy magic number, might not work for every browser/screen */
      color: #3c3836; /* matches editorIndentGuide.background */
      font-family: 'JetBrains Mono', monospace;
      pointer-events: none;
    }

    /* Make Monaco indent guides slightly thicker */
    .monaco-editor .lines-content .core-guide-indent {
      box-shadow: 2px 0 0 0 #3c3836;
    }

    /* Debug toolbar controls (inline) */
    .debug-toolbar-controls {
      display: none;
      align-items: center;
      gap: 0.25rem;
      margin-left: 0.5rem;
      padding-left: 0.5rem;
      border-left: 1px solid var(--bg2);
    }

    .debug-toolbar-controls.visible {
      display: flex;
    }

    .debug-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 4px;
      color: var(--fg4);
      cursor: pointer;
      transition: all 0.15s;
    }

    .debug-btn:hover:not(:disabled) {
      background: var(--bg1);
      color: var(--fg);
    }

    .debug-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .debug-btn.step-into:hover:not(:disabled) { color: var(--blue); }
    .debug-btn.debug-continue:hover:not(:disabled) { color: var(--green); }
    .debug-btn.debug-stop:hover:not(:disabled) { color: var(--red); }

    /* Variables panel (below console) */
    .variables-panel {
      display: none;
      background: var(--bg-hard);
      border-top: 1px solid var(--bg1);
      max-height: 150px;
      overflow-y: auto;
    }

    .variables-panel.visible {
      display: block;
    }

    .condition-display {
      display: none;
      padding: 0.4rem 0.5rem;
      background: var(--bg);
      border-bottom: 1px solid var(--bg1);
      font-size: 0.75rem;
      font-family: monospace;
    }

    .condition-display.visible {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .condition-label {
      color: var(--fg4);
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 0.5px;
    }

    .condition-text {
      color: var(--aqua);
      flex: 1;
    }

    .condition-result {
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .condition-result.true {
      background: rgba(142, 192, 124, 0.2);
      color: var(--green);
    }

    .condition-result.false {
      background: rgba(251, 73, 52, 0.2);
      color: var(--red);
    }

    .variables-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.25rem 0.5rem;
      background: var(--bg);
      font-size: 0.7rem;
      color: var(--fg4);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }

    .variables-header:hover {
      background: var(--bg1);
    }

    .variables-content {
      padding: 0.25rem;
    }

    .variable-item {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.4rem;
      margin: 0.1rem;
      border-radius: 3px;
      background: var(--bg);
      font-size: 0.75rem;
    }

    .variable-item.changed {
      animation: highlight-change 1s ease-out;
    }

    @keyframes highlight-change {
      0% { background: var(--yellow-dim); }
      100% { background: var(--bg); }
    }

    .variable-name {
      color: var(--blue);
      font-weight: 500;
    }

    .variable-value {
      color: var(--fg);
    }

    .variable-type {
      color: var(--fg4);
      font-size: 0.65rem;
    }

    .variables-empty {
      color: var(--fg4);
      font-size: 0.75rem;
      font-style: italic;
      padding: 0.5rem;
    }

    /* Debug line highlight in editor */
    .debug-line-highlight {
      background: rgba(250, 189, 47, 0.15) !important;
      border-left: 3px solid var(--yellow) !important;
    }

    .debug-line-glyph {
      background: var(--yellow);
      border-radius: 50%;
      margin-left: 4px;
    }

  </style>
</head>
<body>
  <div class="app">
    <div class="toolbar">
      <div class="toolbar-title">
        <span>Pseudo++</span>
        <span id="version-label"></span>
      </div>
      <div class="toolbar-actions">
        <button id="btn-run" class="btn btn-run" title="Run">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"></polygon></svg>
        </button>
        <button id="btn-debug" class="btn btn-debug" title="Debug">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7a4 4 0 1 1 8 0v2H8V7z"></path><path d="M6 12h12"></path><path d="M6 16h12"></path><rect x="7" y="10" width="10" height="10" rx="2"></rect><path d="M5 10l-2-1"></path><path d="M19 10l2-1"></path><path d="M5 16l-2 1"></path><path d="M19 16l2 1"></path></svg>
        </button>
        <button id="btn-stop" class="btn btn-stop" title="Stop" style="display: none;">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="1"></rect></svg>
        </button>
        <span id="debug-indicator" class="debug-indicator" style="display: none;">Debug</span>
        <div id="debug-toolbar-controls" class="debug-toolbar-controls">
          <button id="debug-step-into" class="debug-btn step-into" title="Step (F11)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12l7 7 7-7"></path>
            </svg>
          </button>
          <button id="debug-continue" class="debug-btn debug-continue" title="Continue (F5)">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <path d="M8 5v14l11-7z"></path>
            </svg>
          </button>
          <button id="debug-stop" class="debug-btn debug-stop" title="Stop (Shift+F5)">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <rect x="6" y="6" width="12" height="12" rx="1"></rect>
            </svg>
          </button>
        </div>
        <a href="docs.html" target="_blank" class="btn btn-icon" title="Documentație">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="editor-panel" id="editor-panel">
        <div class="panel-header">
          <div class="file-tabs-wrapper">
            <button class="tabs-scroll-btn" id="tabs-scroll-left" title="Scroll left">
              <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg>
            </button>
            <div class="file-tabs" id="file-tabs"></div>
            <button class="tabs-scroll-btn" id="tabs-scroll-right" title="Scroll right">
              <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"></path></svg>
            </button>
            <button class="add-file-btn" id="add-file-btn" title="New file">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
          </div>
          <button id="btn-bac-mode" class="btn-visual-toggle" title="Mod vizual: ligatures + sf→└■">
            <span class="toggle-switch"></span>
            <span class="toggle-label">Vizual</span>
          </button>
          <span id="run-status" class="panel-header-status"></span>
        </div>
        <div id="editor-container">
          <button id="btn-lint" class="btn-lint-float" title="Lint: normalizează caracterele speciale (smart quotes, diacritice, etc.)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7h16M4 12h10M4 17h6"></path>
              <path d="M18 13l3 3-3 3"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="resize-handle" id="resize-handle"></div>

      <div class="console-panel" id="console-panel">
        <div class="panel-header">
          <span class="panel-header-title">Console</span>
          <button id="btn-clear" class="btn btn-icon" title="Clear console">
            <svg class="icon" viewBox="0 0 24 24"><path d="M4 4l16 16M4 20L20 4"></path></svg>
          </button>
        </div>
        <div class="console-output" id="console-output">
          <div class="console-placeholder">$ ready</div>
        </div>
        <div class="variables-panel" id="variables-panel">
          <div class="condition-display" id="condition-display"></div>
          <div class="variables-header" id="variables-header">
            <span>Variables</span>
            <span id="variables-step">Step 0</span>
          </div>
          <div class="variables-content" id="variables-content">
            <span class="variables-empty">No variables</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="pseudo.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script>
    // Set version from version.js
    document.getElementById('version-label').textContent = VERSION;

    // Initialize WASM module
    let Module = null;
    let wasmReady = false;

    PseudoModule().then(mod => {
      Module = mod;
      wasmReady = true;
      console.log('WASM module loaded');
    }).catch(err => {
      console.error('Failed to load WASM module:', err);
    });

    // State
    let editor = null;
    let pseudoInterpreter = null;
    let isRunning = false;
    let isDebugging = false;
    let isWaitingForInput = false;
    let inputCallback = null;
    let stopRequested = false;
    let editorWidth = 60; // percentage

    // File system state
    let files = [];
    let activeFileId = null;
    let fileCounter = 0;

    // BAC mode state
    let bacModeEnabled = false;
    let sfDecorations = [];

    // LocalStorage persistence
    const STORAGE_KEY = 'pseudo_editor_state';

    function saveState() {
      // Save current editor content to active file first
      if (activeFileId && editor) {
        const currentFile = files.find(f => f.id === activeFileId);
        if (currentFile) {
          currentFile.content = editor.getValue();
        }
      }
      const state = {
        files: files,
        activeFileId: activeFileId,
        editorWidth: editorWidth,
        fileCounter: fileCounter,
        bacModeEnabled: bacModeEnabled
      };
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.warn('Failed to save state:', e);
      }
    }

    function loadState() {

    // File management functions
    function createFile(name = null, content = '') {
      fileCounter++;
      const id = `file-${fileCounter}`;
      
      if (!name) {
        name = `untitled-${fileCounter}.pseudo`;
      }

      const file = { id, name, content };
      files.push(file);

      renderTabs();
      switchToFile(id);
      saveState();

      return file;
    }

    function deleteFile(id) {
      if (files.length <= 1) return;
      
      const index = files.findIndex(f => f.id === id);
      if (index === -1) return;

      if (activeFileId === id && editor) {
        files[index].content = editor.getValue();
      }

      files.splice(index, 1);

      if (activeFileId === id) {
        const newIndex = Math.min(index, files.length - 1);
        switchToFile(files[newIndex].id);
      }

      renderTabs();
      saveState();
    }

    function switchToFile(id) {
      if (activeFileId === id) return;

      if (activeFileId && editor) {
        const currentFile = files.find(f => f.id === activeFileId);
        if (currentFile) {
          currentFile.content = editor.getValue();
        }
      }

      activeFileId = id;
      const file = files.find(f => f.id === id);

      if (file && editor) {
        editor.setValue(file.content);
        editor.focus();
      }

      renderTabs();
      saveState();
    }

        saveState();

    function updateAllDecorations() {
      if (!editor) return;

      // Clear existing decorations
      sfDecorations = editor.deltaDecorations(sfDecorations, []);

      if (!bacModeEnabled) return;

      const model = editor.getModel();
      if (!model) return;

      const text = model.getValue();
      const lines = text.split('\n');
      const newDecorations = [];

      // Process each line for 'sf' replacement
      for (let lineNum = 0; lineNum < lines.length; lineNum++) {
        const line = lines[lineNum];

        // Find 'sf' keyword on this line
        const sfMatch = line.match(/^(\s*)sf\b/i);
        if (sfMatch) {
          const indent = sfMatch[1].length; // Number of leading spaces
          const sfStartCol = indent + 1; // 1-based column where 'sf' starts
          const sfEndCol = sfStartCol + 2; // 'sf' is 2 characters

          // Hide the 'sf' text and add └■ before it
          newDecorations.push({
            range: new monaco.Range(lineNum + 1, sfStartCol, lineNum + 1, sfEndCol),
            options: {
              inlineClassName: 'sf-replacement',
              beforeContentClassName: 'sf-end-marker'
            }
          });
        }
      }

      sfDecorations = editor.deltaDecorations([], newDecorations);
    }

      const activeFile = files.find(f => f.id === activeFileId);
      if (!activeFile) return;

      const source = editor.getValue();
      const sourcePtr = Module.allocateUTF8(source);
      const resultPtr = Module._pseudo_lint(sourcePtr);
      Module._free(sourcePtr);

      if (resultPtr) {
        const linted = Module.UTF8ToString(resultPtr);
        Module._pseudo_free_output(resultPtr);

        if (linted !== source) {
          // Save cursor position
          const position = editor.getPosition();

          // Update editor content
          editor.setValue(linted);

          // Restore cursor position
          if (position) {
            editor.setPosition(position);
            editor.revealPositionInCenter(position);
          }

          // Update file content
          activeFile.content = linted;
          saveState();

          appendToConsole('Lint: cod normalizat.', 'system');
        } else {
          appendToConsole('Lint: nicio modificare necesară.', 'system');

      }

    // PseudoDebugger class for step-through debugging
    class PseudoDebugger {
      constructor(wasm) {
        this.wasm = wasm;
        this.stateHistory = [];      // Array of {snapshotId, line, variables}
        this.currentHistoryIndex = -1;
        this.maxHistory = 100;
        this.previousVariables = {};
        this.isAtEnd = false;
        this.isProgramDone = false;
      }

      reset() {
        this.stateHistory = [];
        this.currentHistoryIndex = -1;
        this.previousVariables = {};
        this.isAtEnd = false;
        this.isProgramDone = false;
        if (this.wasm) {
          this.wasm._pseudo_clear_snapshots();
        }
      }

      getVariables() {
        if (!this.wasm) return [];
        const ptr = this.wasm._pseudo_get_variables_json();
        if (!ptr) return [];
        const json = this.wasm.UTF8ToString(ptr);
        this.wasm._pseudo_free_output(ptr);
        try {
          return JSON.parse(json);
        } catch (e) {
          console.error('Failed to parse variables JSON:', e);
          return [];
        }
      }

      getNextLine() {
        if (!this.wasm) return 0;
        return this.wasm._pseudo_get_next_line();
      }

      getConditionInfo() {
        if (!this.wasm) return { valid: false };
        const ptr = this.wasm._pseudo_get_condition_info();
        if (!ptr) return { valid: false };
        const json = this.wasm.UTF8ToString(ptr);
        this.wasm._pseudo_free_output(ptr);
        try {
          return JSON.parse(json);
        } catch (e) {
          return { valid: false };
        }
      }

      setDebugMode(enabled) {
        if (this.wasm) {
          this.wasm._pseudo_set_debug_mode(enabled ? 1 : 0);
        }
      }

      createSnapshot() {
        if (!this.wasm) return -1;
        return this.wasm._pseudo_create_snapshot();
      }

      restoreSnapshot(id) {
        if (!this.wasm) return false;
        return this.wasm._pseudo_restore_snapshot(id) === 1;
      }

      // Execute one statement and save state
      stepInto() {
        if (!this.wasm || this.isProgramDone) return { done: true };

        // If we stepped back and are now stepping forward through history
        if (this.currentHistoryIndex < this.stateHistory.length - 1) {
          this.currentHistoryIndex++;
          const state = this.stateHistory[this.currentHistoryIndex];
          this.restoreSnapshot(state.snapshotId);
          return {
            done: false,
            line: state.line,
            variables: state.variables,
            changedVars: this.getChangedVars(state.variables)
          };
        }

        // Create snapshot before executing
        const snapshotId = this.createSnapshot();
        const line = this.getNextLine();

        // Execute one step
        const result = this.wasm._pseudo_step();

        // Get state after execution
        const variables = this.getVariables();
        const changedVars = this.getChangedVars(variables);
        const conditionInfo = this.getConditionInfo();

        // Save to history
        const stateEntry = { snapshotId, line, variables, conditionInfo };

        if (this.stateHistory.length >= this.maxHistory) {
          this.stateHistory.shift();
        }
        this.stateHistory.push(stateEntry);
        this.currentHistoryIndex = this.stateHistory.length - 1;

        // Update previous variables for change detection
        this.previousVariables = {};
        for (const v of variables) {
          this.previousVariables[v.name] = v.value;
        }

        // Check execution state
        // 0 = EXEC_CONTINUE, 1 = EXEC_DONE, 2 = EXEC_NEEDS_INPUT, 3 = EXEC_ERROR
        const isDone = result === 1;
        const needsInput = result === 2;
        const hasError = result === 3;

        if (isDone) {
          this.isProgramDone = true;
        }

        return {
          done: isDone,
          needsInput,
          hasError,
          line: this.getNextLine(),
          variables,
          changedVars,
          conditionInfo
        };
      }

      // Execute and step over control structures
      stepOver() {
        if (!this.wasm || this.isProgramDone) return { done: true };

        // If we stepped back and are now stepping forward through history
        if (this.currentHistoryIndex < this.stateHistory.length - 1) {
          return this.stepInto(); // Just use normal step through history
        }

        // Create snapshot before executing
        const snapshotId = this.createSnapshot();
        const line = this.getNextLine();

        // Execute step over (runs until same or lower depth)
        const result = this.wasm._pseudo_step_over();

        // Get state after execution
        const variables = this.getVariables();
        const changedVars = this.getChangedVars(variables);
        const conditionInfo = this.getConditionInfo();

        // Save to history
        const stateEntry = { snapshotId, line, variables, conditionInfo };

        if (this.stateHistory.length >= this.maxHistory) {
          this.stateHistory.shift();
        }
        this.stateHistory.push(stateEntry);
        this.currentHistoryIndex = this.stateHistory.length - 1;

        // Update previous variables for change detection
        this.previousVariables = {};
        for (const v of variables) {
          this.previousVariables[v.name] = v.value;
        }

        // Check execution state
        const isDone = result === 1;
        const needsInput = result === 2;
        const hasError = result === 3;

        if (isDone) {
          this.isProgramDone = true;
        }

        return {
          done: isDone,
          needsInput,
          hasError,
          line: this.getNextLine(),
          variables,
          changedVars,
          conditionInfo
        };
      }

      // Go back one step
      stepBack() {
        if (this.currentHistoryIndex <= 0) return null;

        this.currentHistoryIndex--;
        const state = this.stateHistory[this.currentHistoryIndex];
        this.restoreSnapshot(state.snapshotId);

        // Reset program done flag since we went back
        this.isProgramDone = false;

        return {
          line: state.line,
          variables: state.variables,
          changedVars: [],
          conditionInfo: state.conditionInfo || { valid: false }
        };
      }

      // Go forward one step (if we have history)
      stepForward() {
        if (this.currentHistoryIndex >= this.stateHistory.length - 1) {
          // No more history, execute new step
          return this.stepInto();
        }

        this.currentHistoryIndex++;
        const state = this.stateHistory[this.currentHistoryIndex];
        this.restoreSnapshot(state.snapshotId);

        return {
          done: false,
          line: state.line,
          variables: state.variables,
          changedVars: []
        };
      }

      // Jump to specific point in history
      jumpToStep(index) {
        if (index < 0 || index >= this.stateHistory.length) return null;

        this.currentHistoryIndex = index;
        const state = this.stateHistory[index];
        this.restoreSnapshot(state.snapshotId);

        // Reset program done flag if we jumped back
        if (index < this.stateHistory.length - 1) {
          this.isProgramDone = false;
        }

        return {
          line: state.line,
          variables: state.variables,
          changedVars: []
        };
      }

      getChangedVars(currentVars) {
        const changed = [];
        for (const v of currentVars) {
          if (this.previousVariables[v.name] !== v.value) {
            changed.push(v.name);
          }
        }
        return changed;
      }

      canStepBack() {
        return this.currentHistoryIndex > 0;
      }

      canStepForward() {
        return !this.isProgramDone || this.currentHistoryIndex < this.stateHistory.length - 1;
      }

      getCurrentStep() {
        return this.currentHistoryIndex + 1;
      }

      getTotalSteps() {
        return this.stateHistory.length;
      }
    }

    // Update debug UI
    function updateDebugUI(variables, changedVars = [], conditionInfo = null) {
      // Update condition display
      if (conditionInfo && conditionInfo.valid) {
        conditionDisplay.classList.add('visible');
        conditionDisplay.innerHTML = `
          <span class="condition-label">Condition:</span>
          <span class="condition-text">${escapeHtml(conditionInfo.text)}</span>
          <span class="condition-result ${conditionInfo.result ? 'true' : 'false'}">${conditionInfo.result ? 'TRUE' : 'FALSE'}</span>
        `;
      } else {
        conditionDisplay.classList.remove('visible');
        conditionDisplay.innerHTML = '';
      }

      // Update variables list
      if (variables.length === 0) {
        variablesContent.innerHTML = '<span class="variables-empty">No variables</span>';
      } else {
        variablesContent.innerHTML = variables.map(v => {
          const isChanged = changedVars.includes(v.name);
          return `<span class="variable-item ${isChanged ? 'changed' : ''}">
            <span class="variable-name">${escapeHtml(v.name)}</span>=<span class="variable-value">${escapeHtml(v.value)}</span>
            <span class="variable-type">${v.type}</span>
          </span>`;
        }).join('');
      }

      // Update step counter and button states
      if (debugger_) {
        const current = debugger_.getCurrentStep();
        variablesStep.textContent = `Step ${current}`;
        debugStepInto.disabled = debugger_.isProgramDone;
        debugContinue.disabled = debugger_.isProgramDone;
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // Highlight current line in editor
    function highlightDebugLine(line) {
      if (!editor) return;

      debugLineDecorations = editor.deltaDecorations(debugLineDecorations, [{
        range: new monaco.Range(line + 1, 1, line + 1, 1),
        options: {
          isWholeLine: true,
          className: 'debug-line-highlight',
          glyphMarginClassName: 'debug-line-glyph'
        }
      }]);

      // Scroll to line
      editor.revealLineInCenter(line + 1);
    }

    function clearDebugHighlight() {
      if (editor) {
        debugLineDecorations = editor.deltaDecorations(debugLineDecorations, []);
      }
    }

    // Run or debug code
    async function runCode(debug = false) {
      if (isRunning) return;

      // Check if WASM is loaded
      if (!wasmReady || !Module || !Module._pseudo_init) {
        clearConsole();
        appendToConsole('WASM interpreter not loaded yet. Please wait...', 'error');
        return;
      }

      isRunning = true;
      isDebugging = debug;
      stopRequested = false;

      btnRun.style.display = 'none';
      btnDebug.style.display = 'none';
      btnStop.style.display = debug ? 'none' : 'flex';
      debugIndicator.style.display = debug ? 'inline' : 'none';
      runStatus.textContent = debug ? 'Debugging...' : 'Running...';

      // Show/hide debug controls and variables panel
      debugToolbarControls.classList.toggle('visible', debug);
      variablesPanel.classList.toggle('visible', debug);
      if (editor) {
        editor.updateOptions({ glyphMargin: debug });
      }

      clearConsole();
      clearDebugHighlight();
      appendToConsole('Program started.', 'system');

      // Initialize runtime
      if (!Module._pseudo_init()) {
        const error = Module._pseudo_get_init_error();
        appendToConsole('Failed to initialize: ' + (error ? Module.UTF8ToString(error) : 'unknown error'), 'error');
        stopCode(true);
        return;
      }

      // Load source code
      const source = editor.getValue();
      const sourcePtr = Module.allocateUTF8(source);
      const loadResult = Module._pseudo_load(sourcePtr);
      Module._free(sourcePtr);

      if (!loadResult) {
        const error = Module._pseudo_get_error();
        appendToConsole('Parse error: ' + (error ? Module.UTF8ToString(error) : 'unknown error'), 'error');
        stopCode(true);
        return;
      }

      if (debug) {
        // Initialize debugger and enable debug mode (step-by-step visible actions)
        debugger_ = new PseudoDebugger(Module);
        debugger_.setDebugMode(true);
        debugger_.reset();
        updateDebugUI([], [], null);

        // Highlight first line
        const firstLine = debugger_.getNextLine();
        highlightDebugLine(firstLine);

        // Enable controls
        debugStepInto.disabled = false;
        debugContinue.disabled = false;

        appendToConsole('Debug mode: Press Step (F11) or Continue (F5).', 'debug');
      } else {
        // Run mode - disable debug mode for fast execution
        if (Module._pseudo_set_debug_mode) {
          Module._pseudo_set_debug_mode(0);
        }
        await executeRunMode();
      }
    }

    async function executeRunMode() {
      const processOutput = () => {
        while (Module._pseudo_has_output()) {
          const ptr = Module._pseudo_pop_output();
          if (ptr) {
            const output = Module.UTF8ToString(ptr);
            Module._pseudo_free_output(ptr);
            appendToConsole(output, 'output');
          }
        }
      };

      const runUntilBlocked = () => {
        if (stopRequested) {
          processOutput();
          return;
        }

        // Use fast run that executes until done/input/error in one call
        const result = Module._pseudo_run();
        processOutput();

        // 0 = EXEC_CONTINUE, 1 = EXEC_DONE, 2 = EXEC_NEEDS_INPUT, 3 = EXEC_ERROR
        if (result === 2) {
          // Needs input
          isWaitingForInput = true;
          showInputPrompt();
          inputCallback = (value) => {
            const inputPtr = Module.allocateUTF8(value);
            Module._pseudo_push_input(inputPtr);
            Module._free(inputPtr);
            runUntilBlocked();
          };
        } else if (result === 1) {
          // Done
          appendToConsole('Program finished.', 'system');
          stopCode(true);
        } else if (result === 3) {
          // Error
          const error = Module._pseudo_get_error();
          appendToConsole('Runtime error: ' + (error ? Module.UTF8ToString(error) : 'unknown error'), 'error');
          stopCode(true);
        }
      };

      runUntilBlocked();
    }

    // Debug step handlers
    async function debugStepIntoHandler() {
      if (!debugger_ || !isDebugging) return;

      const processOutput = () => {
        while (Module._pseudo_has_output()) {
          const ptr = Module._pseudo_pop_output();
          if (ptr) {
            const output = Module.UTF8ToString(ptr);
            Module._pseudo_free_output(ptr);
            appendToConsole(output, 'output');
          }
        }
      };

      const result = debugger_.stepInto();
      processOutput();

      if (result.needsInput) {
        isWaitingForInput = true;
        debugStepInto.disabled = true;
        showInputPrompt();
        inputCallback = (value) => {
          const inputPtr = Module.allocateUTF8(value);
          Module._pseudo_push_input(inputPtr);
          Module._free(inputPtr);
          debugStepInto.disabled = false;
          debugStepIntoHandler(); // Re-execute the step after input
        };
        return;
      }

      if (result.hasError) {
        const error = Module._pseudo_get_error();
        appendToConsole('Runtime error: ' + (error ? Module.UTF8ToString(error) : 'unknown error'), 'error');
      }

      updateDebugUI(result.variables || [], result.changedVars || [], result.conditionInfo);
      highlightDebugLine(result.line);

      if (result.done) {
        appendToConsole('Program finished.', 'system');
        debugStepInto.disabled = true;
      }
    }

    async function debugContinueHandler() {
      if (!debugger_ || !isDebugging || isWaitingForInput) return;

      // Disable buttons during continue
      debugStepInto.disabled = true;
      debugContinue.disabled = true;

      const processOutput = () => {
        while (Module._pseudo_has_output()) {
          const ptr = Module._pseudo_pop_output();
          if (ptr) {
            const output = Module.UTF8ToString(ptr);
            Module._pseudo_free_output(ptr);
            appendToConsole(output, 'output');
          }
        }
      };

      // Run until done/error/input using the fast run function
      const result = Module._pseudo_run();
      processOutput();

      // Get final state
      const variables = debugger_.getVariables();
      updateDebugUI(variables, [], null);
      clearDebugHighlight();

      // 0 = EXEC_CONTINUE, 1 = EXEC_DONE, 2 = EXEC_NEEDS_INPUT, 3 = EXEC_ERROR
      if (result === 2) {
        // Needs input
        isWaitingForInput = true;
        showInputPrompt();
        const line = Module._pseudo_get_line();
        highlightDebugLine(line);
        debugStepInto.disabled = false;
        debugContinue.disabled = false;
        inputCallback = (value) => {
          const inputPtr = Module.allocateUTF8(value);
          Module._pseudo_push_input(inputPtr);
          Module._free(inputPtr);
          debugContinueHandler();
        };
        return;
      }

      if (result === 1) {
        // Done
        appendToConsole('Program finished.', 'system');
        stopCode(true);
      } else if (result === 3) {
        // Error
        const error = Module._pseudo_get_error();
        appendToConsole('Runtime error: ' + (error ? Module.UTF8ToString(error) : 'unknown error'), 'error');
        stopCode(true);
      }
    }

    function stopCode(silent = false) {
      if (isDebugging && debugger_) {
        debugger_.reset();
        debugger_ = null;
      }

      stopRequested = true;
      isRunning = false;
      isDebugging = false;
      isWaitingForInput = false;
      inputCallback = null;

      const inputLine = consoleOutput.querySelector('.input-line');
      if (inputLine) inputLine.remove();

      if (Module && Module._pseudo_request_stop) {
        Module._pseudo_request_stop();
      }

      if (!silent) {
        appendToConsole('Program stopped.', 'system');
      }

      btnRun.style.display = 'flex';
      btnDebug.style.display = 'flex';
      btnStop.style.display = 'none';
      debugIndicator.style.display = 'none';
      debugToolbarControls.classList.remove('visible');
      variablesPanel.classList.remove('visible');
      runStatus.textContent = '';

      // Disable glyph margin when not debugging
      if (editor) {
        editor.updateOptions({ glyphMargin: false });
      }

      clearDebugHighlight();
    }

    // Event listeners
    btnRun.addEventListener('click', () => runCode(false));
    btnDebug.addEventListener('click', () => runCode(true));
    btnStop.addEventListener('click', stopCode);
    btnClear.addEventListener('click', clearConsole);

    // Debug control event listeners
    debugStepInto.addEventListener('click', debugStepIntoHandler);
    debugContinue.addEventListener('click', debugContinueHandler);
    debugStop.addEventListener('click', stopCode);

    // Keyboard shortcuts for debugging
    document.addEventListener('keydown', (e) => {
      if (!isDebugging) return;

      if (e.key === 'F11') {
        e.preventDefault();
        debugStepIntoHandler();
      } else if (e.key === 'F5' && !e.shiftKey) {
        e.preventDefault();
        debugContinueHandler();
      } else if (e.key === 'F5' && e.shiftKey) {
        e.preventDefault();
        stopCode();
      } else if (e.key === 'Escape') {
        e.preventDefault();
        stopCode();
      }
    });
  </script>
</body>
</html>
