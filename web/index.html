<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pseudo++</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="loop-tooltip">Convertește bucla</div>
  <div id="loop-convert-popup">
    <div class="popup-title">Convertește bucla în:</div>
    <button data-target="for">pentru (for)</button>
    <button data-target="while">cât timp (while)</button>
    <button data-target="do_while">execută...cât timp</button>
    <button data-target="repeat">repetă...până când</button>
  </div>
  <div class="app">
    <div class="toolbar">
      <div class="toolbar-title">
        <span>Pseudo++</span>
        <span id="version-label"></span>
      </div>
      <div class="toolbar-actions">
        <button id="btn-run" class="btn btn-run" data-tooltip="Rulează">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="6 4 20 12 6 20 6 4"></polygon></svg>
        </button>
        <button id="btn-debug" class="btn btn-debug" data-tooltip="Debug">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m8 2 1.88 1.88"/><path d="M14.12 3.88 16 2"/><path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1"/><path d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6z"/><path d="M12 20v-9"/><path d="M6.53 9C4.6 8.8 3 7.1 3 5"/><path d="M6 13H2"/><path d="M3 21c0-2.1 1.7-3.9 3.8-4"/><path d="M20.97 5c0 2.1-1.6 3.8-3.5 4"/><path d="M22 13h-4"/><path d="M17.2 17c2.1.1 3.8 1.9 3.8 4"/></svg>
        </button>
        <button id="btn-stop" class="btn btn-stop" data-tooltip="Oprește" style="display: none;">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="6" width="12" height="12" rx="1"></rect></svg>
        </button>
        <span id="debug-indicator" class="debug-indicator" style="display: none;">Debug</span>
        <div id="debug-toolbar-controls" class="debug-toolbar-controls">
          <button id="debug-step-into" class="debug-btn step-into" data-tooltip="Pas (F11)">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12l7 7 7-7"></path>
            </svg>
          </button>
          <button id="debug-continue" class="debug-btn debug-continue" data-tooltip="Continuă (F5)">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <path d="M8 5v14l11-7z"></path>
            </svg>
          </button>
          <button id="debug-stop" class="debug-btn debug-stop" data-tooltip="Oprește (Shift+F5)">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" stroke="none">
              <rect x="6" y="6" width="12" height="12" rx="1"></rect>
            </svg>
          </button>
        </div>
        <div class="btn-group-transpile">
          <button id="btn-transpile" class="btn btn-transpile-main" data-tooltip="Transpilează">
            <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 16V4m0 0L3 8m4-4 4 4"/><path d="M17 8v12m0 0 4-4m-4 4-4-4"/></svg>
            <span id="transpile-lang-label">C</span>
          </button>
          <button id="btn-transpile-lang" class="btn btn-transpile-caret" data-tooltip="Alege limbaj">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="lang-dropdown" id="lang-dropdown">
            <button class="lang-option" data-lang="c">C</button>
            <button class="lang-option" data-lang="cpp">C++</button>
            <button class="lang-option" data-lang="pascal">Pascal</button>
          </div>
        </div>
        <a href="docs.html" target="_blank" class="btn btn-icon" data-tooltip="Documentație">
          <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        </a>
      </div>
    </div>

    <div class="main">
      <div class="editor-panel" id="editor-panel">
        <div class="panel-header">
          <div class="file-tabs-wrapper">
            <button class="tabs-scroll-btn" id="tabs-scroll-left" data-tooltip="Scrollează stânga">
              <svg class="icon" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"></path></svg>
            </button>
            <div class="file-tabs" id="file-tabs"></div>
            <button class="tabs-scroll-btn" id="tabs-scroll-right" data-tooltip="Scrollează dreapta">
              <svg class="icon" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"></path></svg>
            </button>
            <button class="add-file-btn" id="add-file-btn" data-tooltip="Fișier nou">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"></path></svg>
            </button>
          </div>
          <button id="btn-bac-mode" class="btn-visual-toggle" data-tooltip="Mod vizual: ligatures + sf→└■">
            <span class="toggle-switch"></span>
            <span class="toggle-label">Vizual</span>
          </button>
        </div>
        <div id="editor-body" class="editor-body">
          <div id="editor-container">
            <button id="btn-lint" class="btn-lint-float" data-tooltip="Normalizează caracterele speciale">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 7h16M4 12h10M4 17h6"></path>
                <path d="M18 13l3 3-3 3"></path>
              </svg>
            </button>
          </div>
          <div class="transpile-divider" id="transpile-divider" style="display:none"></div>
          <div class="transpile-pane" id="transpile-pane" style="display:none">
            <div class="transpile-pane-header">
              <span class="transpile-pane-title" id="transpile-pane-title">output.c</span>
              <button class="btn-icon-small" id="btn-transpile-copy" data-tooltip="Copiază codul">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              </button>
              <button class="btn-icon-small" id="btn-transpile-close" data-tooltip="Închide">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div id="transpile-editor-container"></div>
          </div>
          <div class="transpile-divider" id="diff-divider" style="display:none"></div>
          <div class="transpile-pane" id="diff-pane" style="display:none">
            <div class="transpile-pane-header">
              <span class="transpile-pane-title" id="diff-pane-title">Echivalență</span>
              <button class="btn-icon-small" id="btn-diff-apply" data-tooltip="Aplică modificările în fișierul curent">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </button>
              <button class="btn-icon-small" id="btn-diff-newtab" data-tooltip="Deschide în tab nou">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
              </button>
              <button class="btn-icon-small" id="btn-diff-close" data-tooltip="Închide">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <div id="diff-editors-wrapper">
              <div id="diff-orig-container"></div>
              <div class="diff-inner-divider"></div>
              <div id="diff-mod-container"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="resize-handle" id="resize-handle"></div>

      <div class="console-panel" id="console-panel">
        <div class="panel-header">
          <span class="panel-header-title">Consolă</span>
          <button id="btn-clear" class="btn btn-icon" data-tooltip="Șterge consola">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
          </button>
        </div>
        <div class="console-output" id="console-output">
          <div class="console-placeholder">$ gata</div>
        </div>
        <div class="variables-panel" id="variables-panel">
          <div class="condition-display" id="condition-display"></div>
          <div class="variables-header" id="variables-header">
            <span>Variabile</span>
            <span id="variables-step">Pas 0</span>
          </div>
          <div class="variables-content" id="variables-content">
            <span class="variables-empty">Nicio variabilă</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="version.js"></script>
  <script src="pseudo.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
  <script src="js/wasm-runner.js"></script>
  <script src="js/app.js"></script>
  <script src="js/files.js"></script>
  <script src="js/console-ui.js"></script>
  <script src="js/pseudo-debugger.js"></script>
  <script src="js/debug-ui.js"></script>
  <script src="js/transpile-pane.js"></script>
  <script src="js/equivalence-pane.js"></script>
  <script src="js/editor-setup.js"></script>
</body>
</html>
